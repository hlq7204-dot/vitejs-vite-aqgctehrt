<!doctype html>
<html lang="pt-BR" translate="no" class="notranslate">
  <head>
    <meta charset="UTF-8" />
    <meta name="google" content="notranslate" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flash Cards</title>
    
    <style>
      /* Estilos essenciais para a tela de carregamento (Splash Screen) */
      body {
        margin: 0;
        padding: 0;
        background-color: #020617; /* Cor base do seu app (slate-950) */
        font-family: system-ui, -apple-system, sans-serif;
      }
      
      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #020617;
        z-index: 99999;
        transition: opacity 0.6s ease-out, visibility 0.6s ease-out;
      }

      .splash-logo {
        width: 100px;
        height: 100px;
        margin-bottom: 24px;
        border-radius: 24px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        animation: float 4s ease-in-out infinite;
        object-fit: cover;
      }

      /* Spinner de carregamento */
      .splash-spinner {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(99, 102, 241, 0.2); /* indigo-500 suave */
        border-top-color: #6366f1; /* indigo-500 vibrante */
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 24px;
        box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
      }

      /* Título animado */
      .splash-title {
        font-size: 2rem;
        font-weight: 800;
        letter-spacing: -0.025em;
        background: linear-gradient(to right, #818cf8, #a855f7);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin: 0;
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
      }

      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
    </style>
  </head>
  <body>
    <!-- Tela de Carregamento Temática -->
    <div id="splash-screen">
      <img src="image_7aacfc.png" alt="Flash Cards Icon" class="splash-logo" />
      <div class="splash-spinner"></div>
      <h1 class="splash-title">Flash Cards</h1>
    </div>

    <!-- Ponto de montagem do React -->
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Script para ocultar a tela de carregamento suavemente -->
    <script>
      window.addEventListener('load', () => {
        const splash = document.getElementById('splash-screen');
        if (splash) {
          // Pequeno atraso para garantir que o React montou a UI
          setTimeout(() => {
            splash.style.opacity = '0';
            splash.style.visibility = 'hidden';
            // Remove do DOM após a transição
            setTimeout(() => splash.remove(), 600);
          }, 300);
        }
      });
    </script>
  </body>
</html>
